<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1f6feb">
  <link rel="icon" href="logo.png" type="image/png+xml">

  <title>TravelNest - Plan Your Next Adventure</title>
  <link rel="stylesheet" href="css/styles.css">

<body>
  <header id="main-header">
    <nav class="navbar">
      <div class="logo">TravelNest</div>
      <div class="nav-links">
        <a href="index.html" class="active">Home</a>

        <h1>Discover. Plan. Wander.</h1>
        <p>Your all-in-one travel companion</p>
        <div class="hero-quote">
          <span id="hero-quote">Wander often, wonder always.</span>

        <button onclick="window.location.href='explorer.html'" class="cta-btn">Start Exploring</button>

  <footer class="site-footer">
