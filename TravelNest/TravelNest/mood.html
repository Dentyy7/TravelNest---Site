<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1f6feb">
  <link rel="icon" href="logo.png" type="image/png+xml">
  <link rel="manifest" href="manifest.json">
  <title>Travel Mood - TravelNest</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/mood.css">
</head>
<body>
  <header id="main-header">
    <nav class="navbar">
      <div class="logo">TravelNest</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="explorer.html">Explore</a>
        <a href="planner.html">Budget Planner</a>
        <a href="generator.html">Trip Generator</a>
        <a href="mood.html" class="active">Travel Mood</a>
        <a href="feedback.html">Feedback</a>
      </div>
      <div class="hamburger">☰</div>
    </nav>
  </header>

  <main class="page-content">
    <h1>Travel Mood</h1>
    <p class="subtitle">Set the mood and track your travel memories</p>

    <!-- Ambient Sounds Section -->
    <section class="mood-section">
      <h2>Ambient Travel Sounds</h2>
      <div class="sound-controls">
        <button onclick="playSound('beach')" class="sound-btn">Beach Waves</button>
        <button onclick="playSound('forest')" class="sound-btn">Rainforest</button>
        <button onclick="playSound('city')" class="sound-btn">City Ambience</button>
        <button onclick="stopSound()" class="sound-btn stop-btn">Stop Sound!</button>
      </div>
      <audio id="ambient-audio" loop></audio>
    </section>

    <!-- Visited / Planned Destinations -->
    <section class="mood-section">
      <h2>My Travel Memories</h2>
      
      <div class="add-visited">
        <input type="text" id="place-input" placeholder="Add a visited or planned destination">
        <select id="place-type">
          <option value="visited">Visited</option>
          <option value="planned">Planned</option>
        </select>
        <button onclick="addPlace()">Add</button>
      </div>

      <div class="tabs">
        <button onclick="showTab('visited')" class="tab-btn active" data-tab="visited">Visited</button>
        <button onclick="showTab('planned')" class="tab-btn" data-tab="planned">Planned</button>
      </div>

      <ul id="visited-list" class="place-list"></ul>
      <ul id="planned-list" class="place-list" style="display: none;"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <form id="newsletter-form">
        <input type="email" id="newsletter-email" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
      </form>
      <p>&copy; 2026 TravelNest. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="javascript/common.js"></script>
  <script src="javascript/mood.js"></script>
</body>
</html>
