<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1f6feb">
  <link rel="icon" href="logo.png" type="image/png+xml">
  <link rel="manifest" href="manifest.json">
  <title>Random Trip Generator - TravelNest</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/generator.css">
</head>
<body>
  <!-- Navbar (same as others) -->
  <header id="main-header">
    <nav class="navbar">
      <div class="logo">TravelNest</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="explorer.html">Explore</a>
        <a href="planner.html">Budget Planner</a>
        <a href="generator.html" class="active">Trip Generator</a>
        <a href="mood.html">Travel Mood</a>
        <a href="feedback.html">Feedback</a>
      </div>
      <div class="hamburger">☰</div>
    </nav>
  </header>

  <main class="page-content">
    <h1>Random Trip Generator</h1>
    
    <select id="travel-type">
      <option value="">Any Travel Type</option>
      <option value="Adventure">Adventure</option>
      <option value="Relaxation">Relaxation</option>
      <option value="Cultural">Cultural</option>
      <option value="Nature">Nature</option>
    </select>

    <select id="budget-range">
      <option value="">Any Budget</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>

    <button id="pick-btn">Surprise Me!</button>
    <button id="pick-again-btn" style="display:none;">Pick Again</button>

    <div id="recommendation" class="recommendation-card"></div>

    <button id="save-btn" style="display:none;">Save to Wishlist</button>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <form id="newsletter-form">
        <input type="email" id="newsletter-email" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
      </form>
      <p>&copy; 2026 TravelNest. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="javascript/common.js"></script>
  <script src="javascript/generator.js"></script>
</body>
</html>
